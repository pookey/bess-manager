services:
  bess-dev:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: bess-dev
    volumes:
      - ./backend:/app/backend:delegated
      - ./core:/app/core:delegated
      - ./ml:/app/ml:delegated
      - ./frontend/dist:/app/frontend:delegated
      - ./backend/dev-options.json:/data/options.json:ro
      - ./backend/dev-bess-settings.json:/data/bess_settings.json
    environment:
      - TZ=${TZ:-UTC}
      - FLASK_DEBUG=true
      - HA_URL=${HA_URL}
      - HA_TOKEN=${HA_TOKEN}
      - HA_DB_URL=${HA_DB_URL}
      - HA_DB_USER_NAME=${HA_DB_USER_NAME}
      - HA_DB_PASSWORD=${HA_DB_PASSWORD}
      - HA_TEST_MODE=${HA_TEST_MODE}
      - PYTHONPATH=/app/backend:/app
      - WATCHFILES_FORCE_POLLING=true
    ports:
      - "8080:8080"
    env_file:
      - .env
    command: sh -c "cd /app/backend && python3 watch.py"
    restart: unless-stopped
    networks:
      - bess-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5174:5174"
    environment:
      - TZ=${TZ:-UTC}
      - VITE_API_URL=http://bess-dev:8080
    depends_on:
      - bess-dev
    networks:
      - bess-network

networks:
  bess-network:
    driver: bridge
