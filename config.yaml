name: "BESS Manager"
description: "Battery Energy Storage System optimization and management"
version: "8.2.1.2"
slug: "bess_manager"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
ports:
  8080/tcp: 8080
ingress: true
ingress_port: 8080
panel_icon: mdi:battery-charging
panel_title: BESS Manager
panel_admin: true
hassio_api: true
homeassistant_api: true
auth_api: true
options:
  influxdb:
    url: "http://homeassistant.local:8086/api/v2/query"
    bucket: "home_assistant/autogen" # Note: default (if not specified in HA) is homeassistant/autogen
    username: "your_db_username_here"
    password: "your_db_password_here"
  ml:
    location:
      latitude: 59.3293
      longitude: 18.0686
      timezone: "Europe/Stockholm"
    weather_entity: "weather.forecast_home"
    feature_sensors:
      outdoor_temperature: "your_temperature_sensor_id"
    derived_features:
      hour_of_day: true
      day_of_week: false
      daylight_hours: false
    history_context:
      yesterday_same_hour: true
      yesterday_total: true
      week_avg_same_hour: true
      recent_24h_mean: true
    training:
      days_of_history: 30
      test_split: 0.2
      model_params:
        n_estimators: 200
        max_depth: 6
        learning_rate: 0.1
        min_child_weight: 3
schema:
  influxdb:
    url: str
    bucket: str
    username: str
    password: str
  ml:
    location:
      latitude: float
      longitude: float
      timezone: str
    weather_entity: str
    feature_sensors:
      outdoor_temperature: str
    derived_features:
      hour_of_day: bool
      day_of_week: bool
      daylight_hours: bool
    history_context:
      yesterday_same_hour: bool
      yesterday_total: bool
      week_avg_same_hour: bool
      recent_24h_mean: bool
    training:
      days_of_history: int
      test_split: float
      model_params:
        n_estimators: int
        max_depth: int
        learning_rate: float
        min_child_weight: int
